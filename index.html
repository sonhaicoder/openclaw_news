<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech News - Tin Tức Công Nghệ Hàng Ngày</title>
    <style>
        :root {
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --header-bg: rgba(255, 255, 255, 0.95);
            --card-bg: white;
            --text-primary: #333;
            --text-secondary: #666;
            --text-muted: #888;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --shadow-light: rgba(0, 0, 0, 0.1);
            --source-bg: #667eea;
            --link-bg: #764ba2;
            --link-hover: #5a3d7a;
            --article-bg: #f8f9fa;
            --border-tech: #667eea;
            --border-business: #28a745;
            --border-finance: #dc3545;
            --error-color: #ff6b6b;
            --toggle-btn-bg: rgba(255, 255, 255, 0.3);
            --toggle-btn-text: white;
        }

        [data-theme="dark"] {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --header-bg: rgba(30, 30, 50, 0.95);
            --card-bg: #2d2d44;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #888;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --shadow-light: rgba(0, 0, 0, 0.2);
            --source-bg: #4a5568;
            --link-bg: #6b4c9a;
            --link-hover: #8b5cf6;
            --article-bg: #2d2d44;
            --border-tech: #60a5fa;
            --border-business: #34d399;
            --border-finance: #f87171;
            --error-color: #f87171;
            --toggle-btn-bg: rgba(255, 255, 255, 0.1);
            --toggle-btn-text: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--header-bg);
            padding: 20px 0;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-color);
            margin-bottom: 30px;
            text-align: center;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--toggle-btn-bg);
            border: none;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.2em;
            color: var(--toggle-btn-text);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: var(--source-bg);
        }

        h1 {
            color: var(--source-bg);
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-style: italic;
        }

        .last-updated {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-top: 10px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--shadow-color);
        }

        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--article-bg);
        }

        .news-image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--source-bg) 0%, var(--link-bg) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3em;
        }

        .news-content {
            padding: 20px;
        }

        .news-title {
            font-size: 1.3em;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .news-source {
            display: inline-block;
            background: var(--source-bg);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        .news-description {
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .news-link {
            display: inline-block;
            background: var(--link-bg);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .news-link:hover {
            background: var(--link-hover);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: var(--error-color);
            font-size: 1.2em;
        }

        .summary-section {
            max-width: 1200px;
            margin: 50px auto;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 5px 20px var(--shadow-color);
            transition: background 0.3s ease;
        }

        .summary-section h2 {
            color: var(--source-bg);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .summary-article {
            background: var(--article-bg);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--border-tech);
            transition: background 0.3s ease;
        }

        .summary-article h3 {
            color: var(--source-bg);
            margin-bottom: 10px;
        }

        .summary-article.business h3 {
            color: var(--border-business);
        }

        .summary-article.finance h3 {
            color: var(--border-finance);
        }

        .summary-article p {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .summary-article .content {
            color: var(--text-primary);
            line-height: 1.6;
        }

        .summary-link {
            display: inline-block;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            margin-top: 10px;
            font-size: 0.9em;
            background: var(--source-bg);
            transition: background 0.3s ease;
        }

        .summary-article.business .summary-link {
            background: var(--border-business);
        }

        .summary-article.finance .summary-link {
            background: var(--border-finance);
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .theme-toggle {
                position: static;
                margin-top: 15px;
            }
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <button class="theme-toggle" id="theme-toggle" title="Chuyển đổi giao diện">🌙</button>
            <h1>🚀 Tech News</h1>
            <p class="subtitle">Tin tức công nghệ hàng ngày từ các nguồn uy tín</p>
            <p class="last-updated" id="update-time">Cập nhật lần cuối: Chưa có dữ liệu</p>
        </header>

        <div id="news-container">
            <div class="loading">Đang tải tin tức...</div>
        </div>

        <footer>
            <p>© 2026 Tech News - Cập nhật tự động từ các nguồn uy tín</p>
        </footer>

        <!-- Tin tức tổng hợp - Cập nhật: 2026-04-21 08:19:17 -->
<section id="summary-news-section" class="summary-section">
<h2 style="color: var(--source-bg); text-align: center; margin-bottom: 30px; font-size: 2em;">📊 TIN TỨC TỔNG HỢP HÔM NAY</h2>
<div id="summary-news" class="summary-grid">
</div>
</section>

    </div>

    <script>
        // Dark mode toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        
        // Load saved theme from localStorage
        const savedTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });
        
        function updateThemeIcon(theme) {
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        // Danh sách các nguồn tin tức uy tín
        const newsSources = [
            {
                name: "GenK",
                url: "https://genk.vn",
                rss: "https://genk.vn/rss"
            },
            {
                name: "ICTNews",
                url: "https://ictnews.vn",
                rss: "https://ictnews.vn/rss"
            },
            {
                name: "Thanh Niên Công Nghệ",
                url: "https://thanhnien.vn/cong-nghe",
                rss: "https://thanhnien.vn/rss/cong-nghe.rss"
            },
            {
                name: "VnExpress Công Nghệ",
                url: "https://vnexpress.net/khoa-hoc-cong-nghe",
                rss: "https://vnexpress.net/rss/tin-moi-nhat.rss"
            }
        ];

        // Hàm lấy tin tức từ các nguồn
        async function fetchNews() {
            const newsContainer = document.getElementById('news-container');
            newsContainer.innerHTML = '<div class="loading">Đang tải tin tức...</div>';

            try {
                // Sử dụng CORS proxy để tránh lỗi CORS
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const maxItems = 10;

                const newsItems = [];

                // Lấy tin tức từ từng nguồn
                for (const source of newsSources) {
                    try {
                        const response = await fetch(`${proxyUrl}${encodeURIComponent(source.rss)}`);
                        const data = await response.json();
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(data.contents, "text/xml");

                        const items = xmlDoc.querySelectorAll('item');
                        for (let i = 0; i < Math.min(items.length, 3); i++) {
                            const item = items[i];
                            const title = item.querySelector('title').textContent;
                            const link = item.querySelector('link').textContent;
                            const description = item.querySelector('description').textContent;
                            const pubDate = item.querySelector('pubDate').textContent;

                            newsItems.push({
                                title,
                                link,
                                description: description.replace(/<[^>]*>/g, ''),
                                source: source.name,
                                pubDate
                            });
                        }
                    } catch (error) {
                        console.error(`Lỗi khi lấy tin từ ${source.name}:`, error);
                    }
                }

                // Sắp xếp theo ngày đăng
                newsItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

                // Hiển thị tin tức
                displayNews(newsItems.slice(0, maxItems));

            } catch (error) {
                console.error("Lỗi khi lấy tin tức:", error);
                newsContainer.innerHTML = '<div class="error">Không thể tải tin tức. Vui lòng thử lại sau!</div>';
            }
        }

        // Hiển thị tin tức
        function displayNews(newsItems) {
            const newsContainer = document.getElementById('news-container');

            if (newsItems.length === 0) {
                newsContainer.innerHTML = '<div class="error">Không tìm thấy tin tức mới!</div>';
                return;
            }

            let html = '';
            newsItems.forEach(item => {
                html += `
                    <div class="news-card">
                        <div class="news-image-placeholder">📰</div>
                        <div class="news-content">
                            <span class="news-source">${item.source}</span>
                            <h3 class="news-title">${item.title}</h3>
                            <p class="news-description">${item.description.substring(0, 150)}...</p>
                            <a href="${item.link}" class="news-link" target="_blank" rel="noopener noreferrer">Đọc thêm</a>
                        </div>
                    </div>
                `;
            });

            newsContainer.innerHTML = html;
            document.getElementById('update-time').textContent = `Cập nhật lần cuối: ${new Date().toLocaleString('vi-VN')}`;
        }

        // Tải tin tức khi trang được load
        document.addEventListener('DOMContentLoaded', fetchNews);

        // Tải tin tức mới mỗi 30 phút
        setInterval(fetchNews, 30 * 60 * 1000);

        // Hàm lấy tin tức toàn cầu từ các nguồn uy tín
        async function fetchGlobalNews() {
            const summaryContainer = document.getElementById('summary-news');
            summaryContainer.innerHTML = '<div class="loading">Đang tải tin tức toàn cầu...</div>';

            try {
                // Danh sách nguồn tin tức toàn cầu uy tín
                const globalSources = [
                    {
                        name: "TechCrunch",
                        type: "technology",
                        url: "https://techcrunch.com",
                        rss: "https://techcrunch.com/feed/"
                    },
                    {
                        name: "The Verge",
                        type: "technology",
                        url: "https://www.theverge.com",
                        rss: "https://www.theverge.com/rss/index.xml"
                    },
                    {
                        name: "Ars Technica",
                        type: "technology",
                        url: "https://arstechnica.com",
                        rss: "https://arstechnica.com/feed/"
                    },
                    {
                        name: "Wired",
                        type: "technology",
                        url: "https://www.wired.com",
                        rss: "https://www.wired.com/feed/rss"
                    },
                    {
                        name: "Bloomberg Technology",
                        type: "business",
                        url: "https://www.bloomberg.com/technology",
                        rss: "https://www.bloomberg.com/feeds/podcasts/technology.xml"
                    },
                    {
                        name: "Reuters Business",
                        type: "business",
                        url: "https://www.reuters.com/business/",
                        rss: "https://www.reuters.com/tools/rss"
                    },
                    {
                        name: "Financial Times",
                        type: "finance",
                        url: "https://www.ft.com",
                        rss: "https://www.ft.com/?format=rss"
                    },
                    {
                        name: "CNBC",
                        type: "finance",
                        url: "https://www.cnbc.com",
                        rss: "https://www.cnbc.com/id/100003114/device/rss/rss.html"
                    },
                    {
                        name: "MarketWatch",
                        type: "finance",
                        url: "https://www.marketwatch.com",
                        rss: "https://feeds.a.dj.com/rss/RSSMarketsMain.xml"
                    },
                    {
                        name: "Yahoo Finance",
                        type: "finance",
                        url: "https://finance.yahoo.com",
                        rss: "https://feeds.finance.yahoo.com/rss/2.0/headline?s=aapl"
                    }
                ];

                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const newsItems = [];

                // Lấy 5 tin công nghệ
                const techItems = await fetchNewsByType(globalSources.filter(s => s.type === "technology"), 5);
                newsItems.push(...techItems);

                // Lấy 3 tin kinh doanh
                const businessItems = await fetchNewsByType(globalSources.filter(s => s.type === "business"), 3);
                newsItems.push(...businessItems);

                // Lấy 2 tin tài chính
                const financeItems = await fetchNewsByType(globalSources.filter(s => s.type === "finance"), 2);
                newsItems.push(...financeItems);

                // Sắp xếp theo loại
                const sortedItems = newsItems.sort((a, b) => {
                    const order = { technology: 1, business: 2, finance: 3 };
                    return order[a.type] - order[b.type];
                });

                // Hiển thị tin tức
                displaySummaryNews(sortedItems);

            } catch (error) {
                console.error("Lỗi khi lấy tin tức toàn cầu:", error);
                summaryContainer.innerHTML = '<div class="error">Không thể tải tin tức toàn cầu. Vui lòng thử lại sau!</div>';
            }
        }

        // Hàm lấy tin tức theo loại
        async function fetchNewsByType(sources, maxItems) {
            const items = [];
            const proxyUrl = 'https://api.allorigins.win/get?url=';

            for (const source of sources) {
                try {
                    const response = await fetch(`${proxyUrl}${encodeURIComponent(source.rss)}`);
                    const data = await response.json();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(data.contents, "text/xml");

                    const rssItems = xmlDoc.querySelectorAll('item');
                    for (let i = 0; i < Math.min(rssItems.length, maxItems); i++) {
                        const item = rssItems[i];
                        const title = item.querySelector('title').textContent;
                        const link = item.querySelector('link') ? item.querySelector('link').textContent : '';
                        const description = item.querySelector('description') ? item.querySelector('description').textContent : '';
                        const pubDate = item.querySelector('pubDate') ? item.querySelector('pubDate').textContent : new Date().toISOString();

                        // Tóm tắt ngắn 2 câu tiếng Việt (dịch đơn giản)
                        const summary = generateVietnameseSummary(title, description);

                        items.push({
                            title,
                            link,
                            summary,
                            source: source.name,
                            type: source.type,
                            pubDate
                        });
                    }
                } catch (error) {
                    console.error(`Lỗi khi lấy tin từ ${source.name}:`, error);
                }
            }

            return items;
        }

        // Hàm tạo tóm tắt tiếng Việt đơn giản
        function generateVietnameseSummary(title, description) {
            // Chuyển đổi tiêu đề sang tiếng Việt đơn giản
            const vietnameseTitles = {
                "Apple": "Apple",
                "Google": "Google",
                "Microsoft": "Microsoft",
                "AI": "Trí tuệ nhân tạo",
                "Tech": "Công nghệ",
                "Startup": "Khởi nghiệp",
                "Stock": "Cổ phiếu",
                "Market": "Thị trường",
                "Crypto": "Tiền điện tử",
                "Blockchain": "Blockchain"
            };

            let vietnameseTitle = title;
            for (const [en, vi] of Object.entries(vietnameseTitles)) {
                vietnameseTitle = vietnameseTitle.replace(new RegExp(en, 'gi'), vi);
            }

            // Tạo tóm tắt 2 câu đơn giản
            const sentences = [
                `Bài viết giới thiệu về ${vietnameseTitle.toLowerCase().replace(/^./, str => str.toUpperCase())}.`,
                `Nguồn tin cung cấp thông tin chi tiết về chủ đề này.`
            ];

            return sentences.join(' ');
        }

        // Hiển thị tin tức tổng hợp
        function displaySummaryNews(newsItems) {
            const summaryContainer = document.getElementById('summary-news');

            if (newsItems.length === 0) {
                summaryContainer.innerHTML = '<div class="error">Không tìm thấy tin tức toàn cầu!</div>';
                return;
            }

            let html = '';
            newsItems.forEach(item => {
                const typeClass = item.type;

                html += `
                    <article class="summary-article ${typeClass}">
                        <h3>${item.title}</h3>
                        <p><strong>Nguồn:</strong> ${item.source}</p>
                        <p class="content">${item.summary}</p>
                        <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="summary-link">
                            Đọc bài viết gốc
                        </a>
                    </article>
                `;
            });

            summaryContainer.innerHTML = html;
        }

        // Tải tin tức toàn cầu khi trang được load
        document.addEventListener('DOMContentLoaded', fetchGlobalNews);
    </script>
</body>
</html>
